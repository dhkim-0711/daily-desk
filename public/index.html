<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI반도체 데일리 데스크</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI Semiconductor Strategy Desk</p>
          <h1>AI반도체 데일리 데스크</h1>
        </div>
        <div class="toolbar">
          <span id="updatedAt" class="updated-at">데이터 대기 중</span>
          <button id="refreshBtn" class="primary-btn" type="button">새로고침</button>
        </div>
      </header>

      <nav class="view-tabs" aria-label="대시보드 메뉴">
        <button class="view-tab active" data-view="briefing" type="button">브리핑</button>
        <button class="view-tab" data-view="policy" type="button">정책 아이템</button>
        <button class="view-tab" data-view="market" type="button">경제·주식 시황</button>
      </nav>

      <main>
        <section id="briefingView" class="view active">
          <section class="brief-layout">
            <article class="brief-card calm">
              <div class="section-kicker">
                <span>오늘의 브리핑</span>
                <strong id="briefDate">-</strong>
              </div>
              <div id="summaryList" class="brief-summary">
                <div class="skeleton"></div>
                <div class="skeleton short"></div>
              </div>
            </article>

            <article class="brief-card signal-card">
              <div class="section-kicker">
                <span>핵심 신호</span>
                <strong>기술·기업</strong>
              </div>
              <div class="signal-block">
                <h2>기술</h2>
                <div id="techSignals" class="chips quiet"></div>
              </div>
              <div class="signal-block">
                <h2>기업</h2>
                <div id="companySignals" class="chips quiet"></div>
              </div>
            </article>
          </section>

          <section class="controls-band">
            <div>
              <p class="eyebrow">Issue Feed</p>
              <h2>이슈별 동향</h2>
            </div>
            <div class="control-row">
              <label class="search-label">
                <span>검색</span>
                <input id="searchInput" type="search" placeholder="기업, 기술, 기사 키워드" autocomplete="off" />
              </label>
              <label>
                <span>월</span>
                <select id="monthSelect"></select>
              </label>
              <label>
                <span>일자</span>
                <select id="dateSelect"></select>
              </label>
              <div class="filters" role="tablist" aria-label="기사 필터">
                <button class="filter active" data-filter="all" type="button">전체</button>
                <button class="filter" data-filter="domestic" type="button">국내</button>
                <button class="filter" data-filter="global" type="button">해외</button>
                <button class="filter" data-filter="policy" type="button">정책</button>
                <button class="filter" data-filter="market" type="button">시장</button>
              </div>
            </div>
            <div id="activeTag" class="active-tag-row"></div>
          </section>

          <section id="issueList" class="issue-list"></section>
        </section>

        <section id="policyView" class="view">
          <section class="section-band">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Policy Pipeline</p>
                <h2>신규 예산·정책 아이템</h2>
              </div>
              <button id="regenPolicyBtn" class="secondary-btn" type="button">선택 재생성</button>
            </div>
            <div id="policyIdeas" class="policy-grid"></div>
          </section>
        </section>

        <section id="marketView" class="view">
          <section class="section-band">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Market Pulse</p>
                <h2>경제·주식 시황</h2>
              </div>
            </div>
            <div class="market-layout">
              <article class="market-panel">
                <h3>주요 지수</h3>
                <div id="indexList" class="market-grid"></div>
              </article>
              <article class="market-panel">
                <h3>AI·반도체 종목</h3>
                <div id="equityList" class="market-grid"></div>
              </article>
            </div>
          </section>
        </section>
      </main>

      <div id="policyModal" class="modal-backdrop" hidden>
        <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="policyModalTitle">
          <button id="policyModalClose" class="modal-close" type="button" aria-label="닫기">×</button>
          <p class="eyebrow">비R&D 기획안 초안</p>
          <h2 id="policyModalTitle"></h2>
          <div id="policyModalBody" class="modal-body"></div>
        </section>
      </div>

      <div id="issueModal" class="modal-backdrop" hidden>
        <section class="modal-panel issue-modal-panel" role="dialog" aria-modal="true" aria-labelledby="issueModalTitle">
          <button id="issueModalClose" class="modal-close" type="button" aria-label="닫기">×</button>
          <p id="issueModalCount" class="eyebrow"></p>
          <h2 id="issueModalTitle"></h2>
          <div id="issueModalBody" class="modal-body"></div>
        </section>
      </div>
    </div>

    <script src="data-snapshot.js"></script>
    <script src="app.js" type="module"></script>
  </body>
</html>
