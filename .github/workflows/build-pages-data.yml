name: Build dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "10 22,1,4,7,10,13 * * *"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run build:data
      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh dashboard data"
          file_pattern: public/data-snapshot.js public/data/dashboard.json docs/data-snapshot.js docs/data/dashboard.json
